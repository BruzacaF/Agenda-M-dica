<div class="login-wrapper">
  <div class="login-card animate-fade-in">
    <div class="login-header">
      <div class="logo-circle">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
          <path d="M12 5v14"/>
        </svg>
      </div>
      <h2>Agenda Médica</h2>
      <p class="subtitle">Acesse o sistema de agendamentos médicos</p>
    </div>

    <div *ngIf="errorMessage" class="alert-error animate-fade-in">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">E-mail Profissional</label>
        <div class="input-icon-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            placeholder="admin@agendamedica.com.br"
            [class.is-invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
          />
        </div>
        <span class="field-error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')">
          E-mail é obrigatório.
        </span>
        <span class="field-error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')">
          Informe um e-mail válido.
        </span>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <div class="input-icon-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input 
            type="password" 
            id="senha" 
            formControlName="senha" 
            placeholder="••••••••"
            [class.is-invalid]="loginForm.get('senha')?.touched && loginForm.get('senha')?.invalid"
          />
        </div>
        <span class="field-error" *ngIf="loginForm.get('senha')?.touched && loginForm.get('senha')?.hasError('required')">
          Senha é obrigatória.
        </span>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">Entrar no Sistema</span>
        <span *ngIf="loading" class="spinner-wrapper">
          <span class="spinner"></span> Autenticando...
        </span>
      </button>
    </form>

    <div class="login-footer">
      <small>Usuário Padrão: <code>admin@agendamedica.com.br</code> | Senha: <code>AdminPassword123</code></small>
    </div>
  </div>
</div>
