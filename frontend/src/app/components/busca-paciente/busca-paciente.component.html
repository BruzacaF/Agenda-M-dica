<form (ngSubmit)="onSearch()" class="search-form-material">
  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="search-field">
    <mat-label>Nome do Paciente</mat-label>
    <mat-icon matIconPrefix color="primary">person_search</mat-icon>
    <input 
      matInput 
      type="text" 
      [ngModel]="nomePaciente" 
      (input)="onInput($event)"
      name="nomePaciente" 
      placeholder="Ex: Carlos Eduardo..."
      autocomplete="off"
    />
  </mat-form-field>

  <div class="actions-group">
    <button 
      mat-raised-button 
      color="primary" 
      type="submit" 
      class="btn-mat-action" 
      [disabled]="!nomePaciente.trim()">
      <mat-icon>search</mat-icon>
      <span>Pesquisar</span>
    </button>

    <button 
      mat-stroked-button 
      type="button" 
      *ngIf="nomePaciente" 
      (click)="onClear()" 
      class="btn-mat-clear">
      <mat-icon>close</mat-icon>
      <span>Limpar</span>
    </button>
  </div>
</form>
