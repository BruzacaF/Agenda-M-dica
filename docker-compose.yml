version: '3.8'

services:
  backend:
    build: ./backend
    container_name: agenda-medica-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_ENV=development
      - PORT=5000
    networks:
      - agenda-medica-network

  mock-api:
    build: ./mock-api
    container_name: agenda-medica-mock-api
    ports:
      - "5001:5001"
    volumes:
      - ./mock-api:/app
    environment:
      - FLASK_ENV=development
      - PORT=5001
    networks:
      - agenda-medica-network

  frontend:
    build: ./frontend
    container_name: agenda-medica-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - BACKEND_URL=http://backend:5000
      - MOCK_API_URL=http://mock-api:5001
    networks:
      - agenda-medica-network
    depends_on:
      - backend
      - mock-api

networks:
  agenda-medica-network:
    driver: bridge
