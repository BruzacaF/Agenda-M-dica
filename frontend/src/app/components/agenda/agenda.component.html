<div class="agenda-layout">
  <!-- Navbar Topo -->
  <header class="navbar">
    <div class="navbar-brand">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
          <path d="M12 5v14"/>
        </svg>
      </div>
      <span class="brand-title">Agenda Médica</span>
    </div>

    <div class="user-panel" *ngIf="currentUser">
      <div class="user-info">
        <span class="user-name">{{ currentUser.nome }}</span>
        <span class="user-email">{{ currentUser.email }}</span>
      </div>
      <button (click)="logout()" class="btn-logout" title="Sair do sistema">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Sair</span>
      </button>
    </div>
  </header>

  <!-- Container Conteúdo -->
  <main class="content-container">
    <div class="page-header">
      <div>
        <h1>Consultas e Agendamentos</h1>
        <p class="subtitle">Gerencie os horários e pacientes cadastrados na clínica</p>
      </div>

      <!-- Test Controls / Resilience Simulator -->
      <div class="simulators-bar">
        <span class="simulators-label">Simular Testes API:</span>
        <button 
          (click)="toggleSimulateFail()" 
          class="btn-sim" 
          [class.active-danger]="simulateFail">
          {{ simulateFail ? 'Desativar Erro 500' : 'Simular Erro 500' }}
        </button>

        <button 
          (click)="toggleSimulateEmpty()" 
          class="btn-sim" 
          [class.active-warning]="simulateEmpty">
          {{ simulateEmpty ? 'Desativar Lista Vazia' : 'Simular Lista Vazia' }}
        </button>
      </div>
    </div>

    <!-- Barra de Filtro / Busca -->
    <div class="filter-card">
      <div class="search-input-group">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.3-4.3"/>
        </svg>
        <input 
          type="text" 
          [(ngModel)]="searchTerm" 
          (input)="onSearchChange()" 
          placeholder="Buscar por nome do paciente, CPF ou médico..."
        />
        <button *ngIf="searchTerm" (click)="searchTerm = ''; onSearchChange()" class="btn-clear-search">
          ✕
        </button>
      </div>
      
      <div class="records-count" *ngIf="!loading && !errorMessage">
        Registros: <strong>{{ agendamentos.length }}</strong>
      </div>
    </div>

    <!-- Feedback Alerta de Erro na API -->
    <div *ngIf="errorMessage" class="alert-banner error-banner animate-fade-in">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <triangle points="10.29 3.86 1.82 18 18 1.82 22 10.29 3.86"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <div class="alert-content">
        <strong>Atenção (Resiliência de UI):</strong>
        <p>{{ errorMessage }}</p>
      </div>
      <button (click)="loadData()" class="btn-retry">Tentar Novamente</button>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="loading-state">
      <div class="spinner-large"></div>
      <p>Carregando dados da Mock API...</p>
    </div>

    <!-- Tabulator Table Container -->
    <div [hidden]="loading" class="table-card">
      <div #tabulatorTable class="tabulator-element"></div>
    </div>
  </main>
</div>
